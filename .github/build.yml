name: Build Kivy APK

on:
  # 推送到main分支时自动构建
  push:
    branches: [ main ]
  # 也支持手动触发构建
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取你的仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：安装系统依赖（Buildozer构建Android APK必需）
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      # 步骤3：配置Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"  # 建议用3.10/3.11，和你的buildozer.spec版本对应

      # 步骤4：安装Python依赖和Buildozer
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer  # 安装Buildozer
          # 如果你的项目有requirements.txt，加上这行
          # pip install -r requirements.txt

      # 步骤5：运行Buildozer构建APK
      - name: Build APK with Buildozer
        run: buildozer android debug  # 构建debug版APK

      # 步骤6：上传构建好的APK作为产物
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivy-app-apk
          path: bin/*.apk  # Buildozer默认把APK生成在bin目录
          retention-days: 30  # 产物保留30天
